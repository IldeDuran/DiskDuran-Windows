name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate icon
        run: python generate_icon.py

      - name: Generate version info
        run: python version_info.py

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name "DiskDuran" `
            --icon "icon.ico" `
            --version-file "version_info.txt" `
            --add-data "static;static" `
            --add-data "server.py;." `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import uvicorn.lifespan.off `
            --collect-all webview `
            main.py

      - name: Sign exe with SignPath
        if: vars.SIGNPATH_READY == 'true'
        continue-on-error: true
        shell: pwsh
        run: |
          Install-Module -Name SignPath -Force -Scope CurrentUser
          Submit-SigningRequest `
            -InputArtifactPath "dist\DiskDuran\DiskDuran.exe" `
            -ApiToken "${{ secrets.SIGNPATH_API_TOKEN }}" `
            -OrganizationId "${{ secrets.SIGNPATH_ORG_ID }}" `
            -ProjectSlug "DiskDuran" `
            -SigningPolicySlug "release-signing" `
            -OutputArtifactPath "dist\DiskDuran\DiskDuran.exe" `
            -WaitForCompletion

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DiskDuran_Setup
          path: installer_output/DiskDuran_Setup.exe
