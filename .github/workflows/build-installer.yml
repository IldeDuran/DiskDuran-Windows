name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate icon
        run: python generate_icon.py

      - name: Generate version info
        run: python version_info.py

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name "DiskDuran" `
            --icon "icon.ico" `
            --version-file "version_info.txt" `
            --add-data "static;static" `
            --add-data "server.py;." `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import uvicorn.lifespan.off `
            --collect-all webview `
            main.py

      - name: Upload unsigned exe for signing
        id: upload-unsigned
        if: vars.SIGNPATH_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DiskDuran-unsigned
          path: dist/DiskDuran/DiskDuran.exe

      - name: Sign exe with SignPath
        id: sign
        if: vars.SIGNPATH_READY == 'true'
        continue-on-error: true
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: "DiskDuran"
          signing-policy-slug: "release-signing"
          artifact-configuration-slug: "default"
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-output

      - name: Replace exe with signed version
        if: vars.SIGNPATH_READY == 'true' && steps.sign.outcome == 'success'
        run: |
          Copy-Item "signed-output\DiskDuran.exe" "dist\DiskDuran\DiskDuran.exe" -Force

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DiskDuran_Setup
          path: installer_output/DiskDuran_Setup.exe
